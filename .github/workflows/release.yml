name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Prepare artifact
        run: |
          cp .build/release/simpleocr simpleocr
          chmod +x simpleocr
          tar czf simpleocr-macos-arm64.tar.gz simpleocr

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: simpleocr-macos-arm64.tar.gz

  homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Wait for release assets
        run: sleep 30

      - name: Download release asset
        run: |
          curl -sL -o simpleocr.tar.gz \
            "https://github.com/tobilg/simpleocr/releases/download/v${{ steps.version.outputs.version }}/simpleocr-macos-arm64.tar.gz"

      - name: Calculate SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 simpleocr.tar.gz | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: tobilg/homebrew-simpleocr
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          cat > tap/Formula/simpleocr.rb << 'FORMULA_EOF'
          class Simpleocr < Formula
            desc "macOS OCR CLI using Apple Vision for image-to-text workflows in local AI pipelines"
            homepage "https://github.com/tobilg/simpleocr"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/tobilg/simpleocr/releases/download/v#{version}/simpleocr-macos-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.sha256 }}"
              end
            end

            def install
              bin.install "simpleocr"
            end

            test do
              assert_match "simpleocr", shell_output("#{bin}/simpleocr --version")
            end
          end
          FORMULA_EOF

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/simpleocr.rb
          git diff --staged --quiet || git commit -m "Update simpleocr to v${{ steps.version.outputs.version }}"
          git push
